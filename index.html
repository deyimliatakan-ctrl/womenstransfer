<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Women's Football Transfer Center</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-colors duration-300">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // --- İkonlar ---
        const Search = (props) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
        const Calendar = (props) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
        const ArrowRight = (props) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
        const ArrowRightLeft = (props) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></svg>;
        const Filter = (props) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>;
        const ChevronDown = (props) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m6 9 6 6 6-6"/></svg>;
        const ChevronUp = (props) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m18 15-6-6-6 6"/></svg>;
        const Moon = (props) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>;
        const Sun = (props) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;

        // --- Veriler ---
        const ALL_LEAGUES = ["NWSL", "WSL", "Liga F", "Frauen-Bundesliga", "D1 Arkema", "Serie A Femminile", "Damallsvenskan", "A-League Women"];
        const ALL_NATIONALITIES = ["Zambia", "Colombia", "Spain", "Netherlands", "Poland", "Germany", "France", "England", "Malawi", "USA", "Brazil", "Japan", "Sweden", "Canada", "Australia", "Norway", "Italy"];
        const ALL_TEAMS = ["Bay FC", "Chelsea", "Arsenal", "Manchester City", "Barcelona", "Bayern Munich", "San Diego Wave", "PSG", "Olympique Lyon", "Real Madrid", "VfL Wolfsburg", "Juventus", "Roma", "Portland Thorns", "Gotham FC", "Levante", "Madrid CFF"];

        const mockTransfers = [
          { id: 1, playerName: "Racheal Kundananji", playerPhotoUrl: "https://i.postimg.cc/500wsBnG/Adsiz-tasarim-(3).png", nationality: "Zambia", position: "FW", fromClub: "Madrid CFF", toClub: "Bay FC", league: "NWSL", date: "2024-02-13", fee: "Record Fee" },
          { id: 2, playerName: "Mayra Ramírez", playerPhotoUrl: "", nationality: "Colombia", position: "FW", fromClub: "Levante", toClub: "Chelsea", league: "WSL", date: "2024-01-26", fee: "Transfer Fee" },
          { id: 3, playerName: "Mariona Caldentey", playerPhotoUrl: "", nationality: "Spain", position: "FW", fromClub: "Barcelona", toClub: "Arsenal", league: "WSL", date: "2024-07-02", fee: "Free Transfer" },
          { id: 4, playerName: "Vivianne Miedema", playerPhotoUrl: "", nationality: "Netherlands", position: "FW", fromClub: "Arsenal", toClub: "Manchester City", league: "WSL", date: "2024-07-05", fee: "Free Transfer" },
          { id: 5, playerName: "Ewa Pajor", playerPhotoUrl: "", nationality: "Poland", position: "FW", fromClub: "VfL Wolfsburg", toClub: "Barcelona", league: "Liga F", date: "2024-06-17", fee: "Transfer Fee" },
          { id: 6, playerName: "Lena Oberdorf", playerPhotoUrl: "", nationality: "Germany", position: "MF", fromClub: "VfL Wolfsburg", toClub: "Bayern Munich", league: "Frauen-Bundesliga", date: "2024-02-15", fee: "Transfer Fee" },
          { id: 7, playerName: "Delphine Cascarino", playerPhotoUrl: "", nationality: "France", position: "FW", fromClub: "Olympique Lyon", toClub: "San Diego Wave", league: "NWSL", date: "2024-07-24", fee: "Free Transfer" },
          { id: 8, playerName: "Griedge Mbock", playerPhotoUrl: "", nationality: "France", position: "DF", fromClub: "Olympique Lyon", toClub: "PSG", league: "D1 Arkema", date: "2024-07-03", fee: "Free Transfer" },
          { id: 9, playerName: "Lucy Bronze", playerPhotoUrl: "", nationality: "England", position: "DF", fromClub: "Barcelona", toClub: "Chelsea", league: "WSL", date: "2024-07-17", fee: "Free Transfer" },
          { id: 10, playerName: "Tabitha Chawinga", playerPhotoUrl: "", nationality: "Malawi", position: "FW", fromClub: "PSG", toClub: "Olympique Lyon", league: "D1 Arkema", date: "2024-07-02", fee: "Transfer Fee" }
        ];

        // --- ANA UYGULAMA ---
        function App() {
          const [isFilterOpen, setIsFilterOpen] = useState(false);
          const [isDarkMode, setIsDarkMode] = useState(false);

          const [leagueFilter, setLeagueFilter] = useState('');
          const [nationalityFilter, setNationalityFilter] = useState('');
          const [teamFilter, setTeamFilter] = useState(''); 
          const [sortOrder, setSortOrder] = useState('newest'); 

          const uniqueLeagues = useMemo(() => [...new Set([...ALL_LEAGUES, ...mockTransfers.map(t => t.league)])].sort(), []);
          const uniqueNationalities = useMemo(() => [...new Set([...ALL_NATIONALITIES, ...mockTransfers.map(t => t.nationality)])].sort(), []);
          const uniqueTeams = useMemo(() => [...new Set([...ALL_TEAMS, ...mockTransfers.map(t => t.toClub), ...mockTransfers.map(t => t.fromClub)])].sort(), []);

          const handleFilterChange = (type, value) => {
            if (type === 'league') {
              setLeagueFilter(leagueFilter === value ? '' : value);
              setNationalityFilter('');
              setTeamFilter('');
            } else if (type === 'nationality') {
              setLeagueFilter('');
              setNationalityFilter(nationalityFilter === value ? '' : value);
              setTeamFilter('');
            } else if (type === 'team') {
              setLeagueFilter('');
              setNationalityFilter('');
              setTeamFilter(teamFilter === value ? '' : value);
            }
          };

          const handleQuickFilter = (type, value) => {
            handleFilterChange(type, value);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          const filteredAndSortedTransfers = useMemo(() => {
            let result = mockTransfers;

            if (leagueFilter) {
              result = result.filter(t => t.league === leagueFilter);
            }
            if (nationalityFilter) {
              result = result.filter(t => t.nationality === nationalityFilter);
            }
            if (teamFilter) {
              result = result.filter(t => t.toClub === teamFilter || t.fromClub === teamFilter);
            }

            result = [...result].sort((a, b) => {
              const dateA = new Date(a.date);
              const dateB = new Date(b.date);
              return sortOrder === 'newest' ? dateB - dateA : dateA - dateB;
            });

            return result;
          }, [leagueFilter, nationalityFilter, teamFilter, sortOrder]);

          const formatDate = (dateString) => {
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return new Date(dateString).toLocaleDateString('en-US', options);
          };

          return (
            <div className={isDarkMode ? 'dark' : ''}>
              <div className="min-h-screen bg-slate-50 dark:bg-slate-900 font-sans transition-colors duration-300">
                
                {/* Header & Navigasyon */}
                <header className="bg-gradient-to-r from-fuchsia-700 to-purple-800 text-white shadow-md sticky top-0 z-10">
                  <div className="max-w-6xl mx-auto px-4 py-4">
                    <div className="flex justify-between items-center">
                      <div className="flex items-center gap-3">
                        <ArrowRightLeft className="w-6 h-6 hidden sm:block" />
                        <h1 className="text-xl sm:text-2xl font-bold tracking-tight">W-Transfer</h1>
                      </div>
                      
                      {/* Tema Değiştirme Butonu */}
                      <div className="flex items-center gap-1 sm:gap-4">
                        <button 
                          onClick={() => setIsDarkMode(!isDarkMode)}
                          className="p-2 rounded-full hover:bg-white/20 transition-colors focus:outline-none"
                          title="Karanlık Modu Değiştir"
                        >
                          {isDarkMode ? <Sun className="w-6 h-6" /> : <Moon className="w-6 h-6" />}
                        </button>
                      </div>
                    </div>
                  </div>
                </header>

                {/* SAYFA İÇERİĞİ RENDER EDİLİYOR */}
                <main className="max-w-6xl mx-auto px-4 py-8">
                  <div className="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 mb-8 overflow-hidden transition-colors duration-300">
                    <button 
                      onClick={() => setIsFilterOpen(!isFilterOpen)}
                        className="w-full flex items-center justify-between p-4 md:p-5 text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors focus:outline-none"
                      >
                        <div className="flex items-center gap-2 font-semibold text-lg">
                          <Filter className="w-5 h-5 text-fuchsia-600 dark:text-fuchsia-400" />
                          <h2>Filtrele ve Sırala</h2>
                          {(leagueFilter || nationalityFilter || teamFilter) && !isFilterOpen && (
                            <span className="ml-2 bg-fuchsia-100 dark:bg-fuchsia-500/20 text-fuchsia-700 dark:text-fuchsia-300 text-xs px-2 py-0.5 rounded-full transition-colors">
                              Aktif
                            </span>
                          )}
                        </div>
                        {isFilterOpen ? <ChevronUp className="w-5 h-5 text-slate-400 dark:text-slate-500" /> : <ChevronDown className="w-5 h-5 text-slate-400 dark:text-slate-500" />}
                      </button>
                      
                      {isFilterOpen && (
                        <div className="p-4 md:p-5 border-t border-slate-100 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/50 transition-colors duration-300">
                          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                            <div className="flex flex-col gap-1">
                              <label className="text-sm text-slate-500 dark:text-slate-400 font-medium">Lig</label>
                              <select 
                                className="p-2.5 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg text-sm focus:ring-2 focus:ring-fuchsia-500 outline-none transition-all dark:text-slate-200"
                                value={leagueFilter}
                                onChange={(e) => handleFilterChange('league', e.target.value)}
                              >
                                <option value="">Tüm Ligler</option>
                                {uniqueLeagues.map(league => (
                                  <option key={league} value={league}>{league}</option>
                                ))}
                              </select>
                            </div>

                            <div className="flex flex-col gap-1">
                              <label className="text-sm text-slate-500 dark:text-slate-400 font-medium">Uyruk</label>
                              <select 
                                className="p-2.5 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg text-sm focus:ring-2 focus:ring-fuchsia-500 outline-none transition-all dark:text-slate-200"
                                value={nationalityFilter}
                                onChange={(e) => handleFilterChange('nationality', e.target.value)}
                              >
                                <option value="">Tüm Uyruklar</option>
                                {uniqueNationalities.map(nat => (
                                  <option key={nat} value={nat}>{nat}</option>
                                ))}
                              </select>
                            </div>

                            <div className="flex flex-col gap-1">
                              <label className="text-sm text-slate-500 dark:text-slate-400 font-medium">Takım</label>
                              <select 
                                className="p-2.5 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg text-sm focus:ring-2 focus:ring-fuchsia-500 outline-none transition-all dark:text-slate-200"
                                value={teamFilter}
                                onChange={(e) => handleFilterChange('team', e.target.value)}
                              >
                                <option value="">Tüm Takımlar</option>
                                {uniqueTeams.map(team => (
                                  <option key={team} value={team}>{team}</option>
                                ))}
                              </select>
                            </div>

                            <div className="flex flex-col gap-1">
                              <label className="text-sm text-slate-500 dark:text-slate-400 font-medium">Sıralama</label>
                              <select 
                                className="p-2.5 bg-white dark:bg-slate-900 border border-slate-300 dark:border-slate-600 rounded-lg text-sm focus:ring-2 focus:ring-fuchsia-500 outline-none transition-all dark:text-slate-200"
                                value={sortOrder}
                                onChange={(e) => setSortOrder(e.target.value)}
                              >
                                <option value="newest">En Yeni Transferler</option>
                                <option value="oldest">En Eski Transferler</option>
                              </select>
                            </div>
                          </div>
                        </div>
                      )}
                    </div>

                    <div className="space-y-4">
                      {filteredAndSortedTransfers.length === 0 ? (
                        <div className="text-center py-12 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 transition-colors duration-300">
                          <Search className="w-12 h-12 text-slate-300 dark:text-slate-600 mx-auto mb-3" />
                          <p className="text-slate-500 dark:text-slate-400 text-lg">Filtrelerinize uygun transfer bulunamadı.</p>
                          <button 
                            onClick={() => {
                              setLeagueFilter(''); setNationalityFilter(''); setTeamFilter('');
                            }}
                            className="mt-4 text-fuchsia-600 dark:text-fuchsia-400 font-medium hover:text-fuchsia-700 dark:hover:text-fuchsia-300"
                          >
                            Filtreleri Temizle
                          </button>
                        </div>
                      ) : (
                        filteredAndSortedTransfers.map((transfer) => (
                          <div 
                            key={transfer.id} 
                            className="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700 p-4 md:p-6 hover:shadow-md transition-all duration-300 flex flex-col md:flex-row items-start md:items-center justify-between gap-4"
                          >
                            <div className="flex items-center gap-4 w-full md:w-1/3">
                              <div className="relative">
                                {/* GERÇEK FOTOĞRAF VEYA AVATAR SEÇİMİ BURADA YAPILIYOR */}
                                <img 
                                  src={transfer.playerPhotoUrl ? transfer.playerPhotoUrl : `https://ui-avatars.com/api/?name=${transfer.playerName.replace(' ', '+')}&background=e879f9&color=fff&size=64&bold=true`} 
                                  alt={transfer.playerName} 
                                  className="w-14 h-14 rounded-full shadow-sm object-cover border-2 border-fuchsia-100 dark:border-fuchsia-900"
                                />
                              </div>
                              <div>
                                <h3 className="font-bold text-lg text-slate-800 dark:text-slate-100 leading-tight">{transfer.playerName}</h3>
                                <p className="text-sm text-slate-500 dark:text-slate-400 flex items-center gap-1 mt-1">
                                  <span 
                                    onClick={() => handleQuickFilter('nationality', transfer.nationality)}
                                    className="cursor-pointer hover:text-fuchsia-600 dark:hover:text-fuchsia-400 transition-colors"
                                    title="Uyruğa göre filtrele"
                                  >
                                    {transfer.nationality}
                                  </span> 
                                  <span className="text-slate-300 dark:text-slate-600 mx-1">•</span> 
                                  <span className="font-semibold text-slate-600 dark:text-slate-300">{transfer.position}</span>
                                </p>
                              </div>
                            </div>

                            <div className="flex items-center justify-start md:justify-center gap-3 w-full md:w-1/3 bg-slate-50 dark:bg-slate-900/50 p-3 rounded-lg border border-slate-100 dark:border-slate-700 transition-colors duration-300">
                              <div className="text-right flex-1">
                                <span 
                                  onClick={() => handleQuickFilter('team', transfer.fromClub)}
                                  className="text-sm font-medium text-slate-600 dark:text-slate-300 block line-clamp-1 cursor-pointer hover:text-fuchsia-600 dark:hover:text-fuchsia-400 transition-colors" 
                                  title={`${transfer.fromClub} takımına göre filtrele`}
                                >
                                  {transfer.fromClub}
                                </span>
                              </div>
                              <div className="bg-fuchsia-100 dark:bg-fuchsia-500/20 text-fuchsia-600 dark:text-fuchsia-400 p-1.5 rounded-full shrink-0 transition-colors">
                                <ArrowRight className="w-4 h-4" />
                              </div>
                              <div className="text-left flex-1">
                                <span 
                                  onClick={() => handleQuickFilter('team', transfer.toClub)}
                                  className="text-sm font-bold text-slate-800 dark:text-slate-100 block line-clamp-1 cursor-pointer hover:text-fuchsia-600 dark:hover:text-fuchsia-400 transition-colors" 
                                  title={`${transfer.toClub} takımına göre filtrele`}
                                >
                                  {transfer.toClub}
                                </span>
                              </div>
                            </div>

                            <div className="flex flex-row md:flex-col justify-between items-center md:items-end w-full md:w-1/3 gap-2">
                              <div 
                                onClick={() => handleQuickFilter('league', transfer.league)}
                                className="flex items-center gap-1.5 bg-indigo-50 dark:bg-indigo-500/20 text-indigo-700 dark:text-indigo-300 px-3 py-1 rounded-full text-xs font-semibold cursor-pointer hover:bg-indigo-100 dark:hover:bg-indigo-500/30 transition-colors"
                                title={`${transfer.league} ligine göre filtrele`}
                              >
                                {transfer.league}
                              </div>
                              <div className="flex flex-col items-end gap-1">
                              <span className="text-sm text-slate-500 dark:text-slate-400 flex items-center gap-1.5">
                                <Calendar className="w-4 h-4" />
                                {formatDate(transfer.date)}
                              </span>
                              <span className="text-xs font-medium text-slate-400 dark:text-slate-500 bg-slate-100 dark:bg-slate-700 px-2 py-0.5 rounded transition-colors duration-300">
                                {transfer.fee}
                              </span>
                            </div>
                          </div>
                        </div>
                      ))
                    )}
                  </div>
                </main>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
