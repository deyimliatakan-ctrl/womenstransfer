        const generateAvatar = (name, size = 64) => {
          try {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // Premium dark background for avatars
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#c026d3');
            gradient.addColorStop(1, '#4c1d95');
            ctx.fillStyle = gradient;
            
            ctx.fillRect(0, 0, size, size);
            ctx.font = `bold ${size * 0.4}px Lexend, sans-serif`;
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const parts = name.trim().split(' ');
            let initials = parts[0][0];
            if (parts.length > 1) {
                initials += parts[parts.length - 1][0];
            }
            ctx.fillText(initials.toUpperCase(), size / 2, size / 2 + (size * 0.05));
            return canvas.toDataURL('image/png');
          } catch (e) {
            return '';
          }
        };

            reader.readAsDataURL(blob);
          });
        };

                                >
                                  <option value="newest">Newest First</option>
                                  <option value="oldest">Oldest First</option>
                                </select>
                                <ChevronDown className="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-brand-500 pointer-events-none" />
                            </div>
                          </div>

                        </div>
                        
                        {(leagueFilter || nationalityFilter || teamFilter) && (
                             <div className="mt-6 flex justify-end border-t border-slate-100 dark:border-white/5 pt-4">
                                <button 
                                    onClick={() => { setLeagueFilter(''); setNationalityFilter(''); setTeamFilter(''); }} 
                                    className="text-sm font-bold text-slate-500 hover:text-brand-500 transition-colors"
                                >
                                    Clear All Filters
                                </button>
                             </div>
                        )}
                      </div>
                  </div>

                  {}
                  {/* Main Transfer Grid */}
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {filteredAndSortedTransfers.length === 0 ? (
                      <div className="col-span-full flex flex-col items-center justify-center py-24 bg-white dark:bg-white/5 rounded-3xl border border-slate-200 dark:border-white/5 border-dashed">
                        <div className="w-16 h-16 bg-slate-100 dark:bg-white/5 rounded-full flex items-center justify-center mb-4">
                            <Search className="w-8 h-8 text-slate-400" />
                        </div>
                        <h3 className="text-xl font-bold font-display text-slate-800 dark:text-slate-200 mb-2">No Transfers Found</h3>
                        <p className="text-slate-500 dark:text-slate-400 text-center max-w-sm mb-6">We couldn't find any transfers matching your current filters. Try adjusting them.</p>
                        <button onClick={() => { setLeagueFilter(''); setNationalityFilter(''); setTeamFilter(''); }} className="px-6 py-2.5 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold rounded-xl hover:opacity-90 transition-opacity">
                          Clear Filters
                        </button>
                      </div>
                    ) : (
                      filteredAndSortedTransfers.map((transfer) => (
                        <div key={transfer.id} className="group bg-white dark:bg-[#121622] rounded-[1.5rem] border border-slate-200 dark:border-white/5 overflow-hidden hover:border-brand-500/30 dark:hover:border-brand-500/30 hover:shadow-xl dark:hover:shadow-glow transition-all duration-300 flex flex-col">
                          
                          {/* Card Header: Player Info */}
                          <div className="p-5 flex items-start gap-4">
                            <div className="relative shrink-0">
                                <div className="absolute inset-0 bg-brand-500 rounded-full blur opacity-0 group-hover:opacity-40 transition-opacity duration-300"></div>
                                <img 
                                    src={transfer.playerPhotoUrl ? getSafeImageUrl(transfer.playerPhotoUrl) : generateAvatar(transfer.playerName, 100)} 
                                    alt={transfer.playerName} 
                                    className="w-16 h-16 rounded-full object-cover border-2 border-white dark:border-slate-800 relative z-10" 
                                    onError={(e) => { e.target.onerror = null; e.target.src = generateAvatar(transfer.playerName, 100); }} 
                                />
                            </div>

                            <div className="flex-1 min-w-0 pt-1">
                                <h3 className="text-lg font-black font-display text-slate-900 dark:text-white leading-tight truncate mb-1" title={transfer.playerName}>
                                    {transfer.playerName}
                                </h3>
                                <div className="flex items-center gap-2 text-xs font-semibold">
                                    <span 
                                        onClick={() => handleQuickFilter('nationality', transfer.nationality)} 
                                        className="text-slate-500 dark:text-slate-400 hover:text-brand-500 dark:hover:text-brand-400 cursor-pointer transition-colors truncate"
                                        title={`Filter by ${transfer.nationality}`}
                                    >
                                        {transfer.nationality}
                                    </span>
                                    <span className="w-1 h-1 rounded-full bg-slate-300 dark:bg-slate-600"></span>
                                    <span className="text-brand-600 dark:text-brand-400 px-1.5 py-0.5 bg-brand-50 dark:bg-brand-500/10 rounded">
                                        {transfer.position}
                                    </span>
                                </div>
                            </div>
                          </div>

                          {/* Card Body: Transfer Path */}
                          <div className="px-5 py-4 bg-slate-50/50 dark:bg-black/20 border-y border-slate-100 dark:border-white/5 flex flex-col justify-center flex-1">
                              <div className="flex items-center justify-between w-full">
                                  {/* From */}
                                  <div className="flex-1 min-w-0 pr-2">
                                      <span 
                                        onClick={() => handleQuickFilter('team', transfer.fromClub)} 
                                        className="block text-sm font-semibold text-slate-600 dark:text-slate-300 truncate cursor-pointer hover:text-brand-500 transition-colors"
                                      >
                                          {transfer.fromClub}
                                      </span>
                                  </div>
                                  
                                  {/* Arrow */}
                                  <div className="shrink-0 flex items-center justify-center w-8 h-8 rounded-full bg-white dark:bg-[#1a1c29] border border-slate-100 dark:border-white/5 text-slate-300 dark:text-slate-500 group-hover:text-brand-500 group-hover:border-brand-200 dark:group-hover:border-brand-500/30 transition-all">
                                      <ArrowRight className="w-4 h-4" />
                                  </div>

                                  {/* To */}
                                  <div className="flex-1 min-w-0 pl-2 text-right">
                                      <span 
                                        onClick={() => handleQuickFilter('team', transfer.toClub)} 
                                        className="block text-sm font-black text-slate-900 dark:text-white truncate cursor-pointer hover:text-brand-500 transition-colors"
                                      >
                                          {transfer.toClub}
                                      </span>
                                  </div>
                              </div>
                          </div>

                          {/* Card Footer: Metadata & Actions */}
                          <div className="p-5 flex items-center justify-between">
                              <div className="flex flex-col gap-1 min-w-0">
                                  <div 
                                    onClick={() => handleQuickFilter('league', transfer.league)} 
                                    className="text-xs font-bold text-indigo-600 dark:text-indigo-400 cursor-pointer hover:underline truncate"
                                  >
                                      {transfer.league}
                                  </div>
                                  <div className="flex items-center gap-1.5 text-xs font-medium text-slate-500">
                                      <Calendar className="w-3 h-3" /> {formatDate(transfer.date)}
                                  </div>
                              </div>

                              <button 
                                onClick={() => handleShareTwitter(transfer)} 
                                disabled={generatingId === transfer.id} 
                                className="shrink-0 w-10 h-10 rounded-xl flex items-center justify-center bg-slate-100 dark:bg-white/5 text-slate-500 dark:text-slate-400 hover:bg-[#1DA1F2] hover:text-white dark:hover:bg-[#1DA1F2] dark:hover:text-white transition-all disabled:opacity-50"
                                title="Share Transfer Card"
                              >
                                {generatingId === transfer.id ? (
                                    <span className="w-5 h-5 block animate-spin rounded-full border-2 border-current border-t-transparent"></span>
                                ) : (
                                    <XLogo className="w-4 h-4" />
                                )}
                              </button>
                          </div>
                        </div>
                      ))
                    )}
                  </div>

                </main>
                
                {}
                {/* Footer */}
                <footer className="w-full border-t border-slate-200 dark:border-white/5 bg-white dark:bg-[#0B0F19] py-8 text-center text-sm font-medium text-slate-500 dark:text-slate-400">
                   <p>© {new Date().getFullYear()} W-Transfer Tracker. All rights reserved.</p>
                </footer>

              </div>
            </div>
          );
        }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
