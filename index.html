        ];


        // Yerel (Offline) Avatar Üretici
        const generateAvatar = (name, size = 64) => {
          try {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#e879f9'; // fuchsia-400
            ctx.fillRect(0, 0, size, size);
            ctx.font = `bold ${size * 0.4}px Inter, sans-serif`;
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const parts = name.trim().split(' ');
            let initials = parts[0][0];
            if (parts.length > 1) {
                initials += parts[parts.length - 1][0];
            }
            ctx.fillText(initials.toUpperCase(), size / 2, size / 2 + (size * 0.05));
            return canvas.toDataURL('image/png');
          } catch (e) {
            return '';
          }
        };

        const getSafeImageUrl = (url) => {
          if (!url) return '';
          if (url.startsWith('data:') || url.includes('wsrv.nl')) return url;
          return `https://wsrv.nl/?url=${encodeURIComponent(url)}&output=webp`;
        };

        const blobToBase64 = (blob) => {
          return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.readAsDataURL(blob);
          });
        };

        // --- MAIN APP ---
        function App() {
          const [isFilterOpen, setIsFilterOpen] = useState(false);

          const [nationalityFilter, setNationalityFilter] = useState('');
          const [teamFilter, setTeamFilter] = useState(''); 
          const [sortOrder, setSortOrder] = useState('newest'); 

          const uniqueLeagues = useMemo(() => [...new Set([...ALL_LEAGUES, ...mockTransfers.map(t => t.league)])].sort(), []);
          const uniqueNationalities = useMemo(() => [...new Set([...ALL_NATIONALITIES, ...mockTransfers.map(t => t.nationality)])].sort(), []);
          const uniqueTeams = useMemo(() => [...new Set([...ALL_TEAMS, ...mockTransfers.map(t => t.toClub), ...mockTransfers.map(t => t.fromClub)])].sort(), []);

          const handleFilterChange = (type, value) => {
            if (type === 'league') {
              setLeagueFilter(leagueFilter === value ? '' : value);
              setNationalityFilter('');
              setTeamFilter('');
            } else if (type === 'nationality') {
              setLeagueFilter('');
              setNationalityFilter(nationalityFilter === value ? '' : value);
              setTeamFilter('');
            } else if (type === 'team') {
              setLeagueFilter('');
              setNationalityFilter('');
              setTeamFilter(teamFilter === value ? '' : value);
            }
          };

          const handleQuickFilter = (type, value) => {
            handleFilterChange(type, value);
            window.scrollTo({ top: 0, behavior: 'smooth' });
          };

          // 🚀 GELİŞMİŞ X (TWITTER) PAYLAŞIM FONKSİYONU
          const handleShareTwitter = async (transfer) => {
            if (generatingId) return; // Çift tıklamayı önle
            
            // 1. ANINDA TWITTER'I AÇ (Pop-up engelleyicisine takılmamak için beklemeden çalıştırıyoruz)

            const twitterUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(tweetText)}`;
            window.open(twitterUrl, '_blank');

            // 2. ARKA PLANDA GÖRSELİ HAZIRLA VE İNDİR
            setGeneratingId(transfer.id);

            // Github vb. CORS engellerini aşmak için en stabil proxy olan wsrv.nl kullanıyoruz
            let safeBase64Url = '';
            if (transfer.playerPhotoUrl) {
              try {
                const proxyUrl = `https://wsrv.nl/?url=${encodeURIComponent(transfer.playerPhotoUrl)}&output=png&w=400&h=400&fit=cover`;
                const res = await fetch(proxyUrl);
                
                if (res.ok) {
                    const blob = await res.blob();
                    safeBase64Url = await blobToBase64(blob);
                } else {
                    throw new Error("Proxy fetch failed");
                }
              } catch (error) {
                console.error("Görsel yüklenemedi, yedek oluşturuluyor:", error);
                safeBase64Url = generateAvatar(transfer.playerName, 300);
              }

              safeBase64Url = generateAvatar(transfer.playerName, 300);

                    scale: 1, 
                    backgroundColor: '#0f172a' // slate-900
                  });
                  
                  // Resmi cihaza indir
                  const dataUrl = canvas.toDataURL("image/png");
                  const link = document.createElement("a");
                  link.href = dataUrl;
                  link.download = `${transfer.playerName.replace(/\s+/g, '_')}_Transfer.png`;
                  link.click();

              return sortOrder === 'newest' ? dateB - dateA : dateA - dateB;

            return result;

                        <span className="text-fuchsia-500">•</span>
                        <span className="font-semibold text-white">{exportTransfer.position}</span>

                      {/* İnce, düz ayırıcı çizgi (Rengi JOINED yazısıyla aynı yapıldı) */}
                      <div className="w-[300px] h-[2px] bg-fuchsia-500 mb-6 rounded-full shadow-[0_0_10px_rgba(217,70,239,0.5)]"></div>

                      {/* Takımlar (Arka plan kaldırıldı, metinler temiz bir şekilde eklendi) */}
                      <div className="flex flex-col items-center justify-center w-full max-w-[950px]">
                        <span className="text-4xl font-bold text-fuchsia-500 tracking-[0.3em] uppercase mb-2">
                          Joined

                          {exportTransfer.toClub}

                        W-Transfer Tracker

                    </div>
                  </div>

                                className="text-sm font-bold text-slate-800 dark:text-slate-100 block line-clamp-1 cursor-pointer hover:text-fuchsia-600 dark:hover:text-fuchsia-400 transition-colors" 
                                title={`Filter by ${transfer.toClub}`}
                              >
                                {transfer.toClub}
                              </span>
                            </div>
                          </div>

                          <div className="flex flex-row md:flex-col justify-between items-center md:items-end w-full md:w-1/3 gap-2">
                            <div className="flex items-center gap-2">
                              <div 
                                onClick={() => handleQuickFilter('league', transfer.league)}
                                className="flex items-center gap-1.5 bg-indigo-50 dark:bg-indigo-500/20 text-indigo-700 dark:text-indigo-300 px-3 py-1 rounded-full text-xs font-semibold cursor-pointer hover:bg-indigo-100 dark:hover:bg-indigo-500/30 transition-colors"
                                title={`Filter by ${transfer.league}`}
                              >
                                {transfer.league}
                              </div>
                              
                              {/* Manuel Twitter Paylaşım Butonu */}
                              <button 
                                onClick={() => handleShareTwitter(transfer)}
                                disabled={generatingId === transfer.id}
                                className="p-1.5 rounded-full flex items-center justify-center bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                                title="Share on X (Twitter)"
                              >
                                {generatingId === transfer.id ? (
                                  <span className="w-4 h-4 block animate-spin rounded-full border-2 border-slate-400 border-t-slate-800 dark:border-t-white"></span>
                                ) : (
                                  <XLogo className="w-4 h-4" />
                                )}
                              </button>
                            </div>
                            
                            <div className="flex flex-col items-end gap-1">
                              <span className="text-sm text-slate-500 dark:text-slate-400 flex items-center gap-1.5">
                                <Calendar className="w-4 h-4" />
                                {formatDate(transfer.date)}
                              </span>
                            </div>
                          </div>
                        </div>
                      ))
                    )}
                  </div>
                </main>

              </div>
            </div>
          );
        }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
