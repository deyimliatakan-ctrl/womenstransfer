        const generateAvatar = (name, size = 800) => {
          try {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#c026d3');
            gradient.addColorStop(1, '#4c1d95');
            ctx.fillStyle = gradient;
            
            ctx.fillRect(0, 0, size, size);
            ctx.font = `bold ${size * 0.4}px Lexend, sans-serif`;
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const parts = name.trim().split(' ');
            let initials = parts[0][0];
            if (parts.length > 1) {
                initials += parts[parts.length - 1][0];
            }
            ctx.fillText(initials.toUpperCase(), size / 2, size / 2 + (size * 0.05));
            return canvas.toDataURL('image/png');
          } catch (e) {
            return '';
          }
        };

          return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.readAsDataURL(blob);
          });
        };

                )}

                {/* Modern Navbar */}
                <header className="relative w-full border-b border-slate-200 dark:border-white/5 bg-white/80 dark:bg-[#0B0F19]/80 backdrop-blur-xl sticky top-0 z-40">
                  <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="flex justify-between items-center h-20">
                      <div className="flex items-center gap-3">
                        <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-500 to-indigo-600 flex items-center justify-center shadow-glow">
                          <span className="text-white font-black text-xl font-display">W</span>
                        </div>
                        <h1 className="text-2xl font-black tracking-tight font-display bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-600 dark:from-white dark:to-slate-400 hidden sm:block uppercase">
                          Womens Football <span className="text-brand-600 dark:text-brand-400">Transfer Tracker</span>
                        </h1>
                      </div>
                      <div className="flex items-center gap-4">
                        <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2.5 rounded-full hover:bg-slate-100 dark:hover:bg-white/10 transition-colors focus:outline-none ring-1 ring-slate-200 dark:ring-white/10" title="Toggle Theme">
                          {isDarkMode ? <Sun className="w-5 h-5 text-slate-300" /> : <Moon className="w-5 h-5 text-slate-600" />}
                        </button>
                      </div>
                    </div>
                  </div>
                </header>

                <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12 space-y-16">
                  
                  {/* Hero Banner */}
                  <div className="text-center max-w-3xl mx-auto space-y-6">
                    <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-brand-100 dark:bg-brand-500/10 text-brand-700 dark:text-brand-400 text-sm font-semibold border border-brand-200 dark:border-brand-500/20">
                      <Zap className="w-4 h-4" /> Live Transfer Updates
                    </div>
                    <h2 className="text-4xl sm:text-5xl md:text-6xl font-black font-display tracking-tight text-slate-900 dark:text-white leading-tight">
                      The Global Hub for <br className="hidden sm:block" />
                      <span className="text-transparent bg-clip-text bg-gradient-to-r from-brand-500 to-indigo-500">Women's Football</span>
                    </h2>
                    <p className="text-lg text-slate-600 dark:text-slate-400 font-medium">
                      Track the latest moves, filter by league or nation, and stay ahead of the game.
                    </p>
                  </div>

                  {}
                  {topTransfers.length > 0 && (
                    <div className="relative">
                      <div className="flex items-center justify-between mb-8">
                        <h2 className="text-2xl font-black font-display tracking-tight text-slate-900 dark:text-white flex items-center gap-3 uppercase">
                          <span className="w-2 h-8 bg-brand-500 rounded-full shadow-glow"></span>
                          Top Transfers
                        </h2>
                      </div>
                      
                      <div className="flex overflow-x-auto gap-6 pb-8 pt-2 snap-x snap-mandatory [&::-webkit-scrollbar]:hidden [-ms-overflow-style:'none'] [scrollbar-width:'none']">
                        {topTransfers.map((transfer) => {
                          return (
                            <div key={`top-${transfer.id}`} className="snap-start shrink-0 w-[280px] h-[380px] rounded-[2rem] overflow-hidden relative group cursor-pointer border border-slate-200 dark:border-white/10 shadow-lg hover:shadow-xl dark:shadow-none hover:-translate-y-2 transition-all duration-500 bg-white dark:bg-slate-900 isolate">
                              <img 
                                src={transfer.topPhotoUrl ? transfer.topPhotoUrl : (transfer.playerPhotoUrl ? transfer.playerPhotoUrl : generateAvatar(transfer.playerName, 800))}
                                alt={transfer.playerName}
                                className="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"
                                onError={(e) => { e.target.onerror = null; e.target.src = generateAvatar(transfer.playerName, 800); }}
                              />
                              <div className="absolute inset-0 bg-gradient-to-t from-[#0B0F19] via-[#0B0F19]/40 to-transparent opacity-90 group-hover:opacity-80 transition-opacity duration-300"></div>
                              <div className="absolute inset-0 p-6 flex flex-col justify-end z-10">
                                <div className="transform translate-y-2 group-hover:translate-y-0 transition-transform duration-300">
                                  <h4 className="text-2xl font-black text-white leading-tight font-display mb-1">{transfer.playerName}</h4>
                                  <p className="text-brand-400 font-bold text-sm uppercase tracking-widest">{transfer.toClub}</p>
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  <hr className="border-slate-200 dark:border-white/5" />

                  {}
                  <div className="flex flex-col gap-6">
                    <div className="flex flex-col md:flex-row md:items-end justify-between gap-6 pt-4">
                      <div>
                          <h2 className="text-2xl font-black font-display tracking-tight text-slate-900 dark:text-white flex items-center gap-3 uppercase mb-2">
                            <span className="w-2 h-8 bg-indigo-500 rounded-full shadow-[0_0_10px_rgba(99,102,241,0.5)]"></span>
                            Latest Transfers
                          </h2>
                      </div>

                      <button 
                        onClick={() => setIsFilterOpen(!isFilterOpen)} 
                        className={`flex items-center gap-2 px-5 py-2.5 rounded-xl font-bold text-sm transition-all duration-300 ${isFilterOpen || leagueFilter || nationalityFilter || teamFilter || selectedDate ? 'bg-brand-500 text-white shadow-glow' : 'bg-white dark:bg-white/5 text-slate-700 dark:text-slate-300 border border-slate-200 dark:border-white/10 hover:bg-slate-50 dark:hover:bg-white/10'}`}
                      >
                        <Filter className="w-4 h-4" />
                        {isFilterOpen ? 'Close Filters' : 'Filter & Sort'}
                        {(leagueFilter || nationalityFilter || teamFilter || selectedDate) && (
                          <span className="ml-1 bg-white text-brand-600 px-1.5 py-0.5 rounded text-[10px] leading-none">ACTIVE</span>
                        )}
                      </button>
                    </div>

                    {/* Main Dropdown Filter Panel */}
                    <div className={`overflow-hidden transition-all duration-500 ease-in-out ${isFilterOpen ? 'max-h-96 opacity-100' : 'max-h-0 opacity-0 hidden'}`}>
                        <div className="bg-white dark:bg-white/5 backdrop-blur-xl border border-slate-200 dark:border-white/10 rounded-2xl p-6 shadow-sm mb-2">
                          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                            
                            {[
                                { label: 'League', value: leagueFilter, setter: handleFilterChange, type: 'league', options: uniqueLeagues },
                                { label: 'Nationality', value: nationalityFilter, setter: handleFilterChange, type: 'nationality', options: uniqueNationalities },
                                { label: 'Team', value: teamFilter, setter: handleFilterChange, type: 'team', options: uniqueTeams }
                            ].map((filterGrp) => (
                                <div key={filterGrp.label} className="flex flex-col gap-2">
                                  <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest">{filterGrp.label}</label>
                                  <div className="relative">
                                      <select 
                                        className="w-full appearance-none bg-slate-50 dark:bg-black/50 border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 pr-10 text-sm font-semibold text-slate-800 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-brand-500/50 transition-all cursor-pointer"
                                        value={filterGrp.value} 
                                        onChange={(e) => filterGrp.setter(filterGrp.type, e.target.value)}
                                      >
                                        <option value="">All {filterGrp.label}s</option>
                                        {filterGrp.options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                      </select>
                                      <ChevronDown className="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none" />
                                  </div>
                                </div>
                            ))}

                            <div className="flex flex-col gap-2">
                              <label className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest">Sort By</label>
                              <div className="relative">
                                  <select 
                                    className="w-full appearance-none bg-brand-50 dark:bg-brand-500/10 border border-brand-100 dark:border-brand-500/20 rounded-xl px-4 py-3 pr-10 text-sm font-bold text-brand-700 dark:text-brand-400 focus:outline-none focus:ring-2 focus:ring-brand-500/50 transition-all cursor-pointer"
                                    value={sortOrder} 
                                    onChange={(e) => setSortOrder(e.target.value)}
                                  >
                                    <option value="newest">Newest First</option>
                                    <option value="oldest">Oldest First</option>
                                  </select>
                                  <ChevronDown className="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-brand-500 pointer-events-none" />
                              </div>
                            </div>
                          </div>
                          
                          {(leagueFilter || nationalityFilter || teamFilter || selectedDate) && (
                               <div className="mt-6 flex justify-end border-t border-slate-100 dark:border-white/5 pt-4">
                                  <button 
                                      onClick={clearAllFilters} 
                                      className="text-sm font-bold text-slate-500 hover:text-brand-500 transition-colors"
                                  >
                                      Clear All Filters
                                  </button>
                               </div>
                          )}
                        </div>
                    </div>
                    
                    {}
                    {/* Date Timeline Filter */}
                    <div className="w-full mt-2 mb-2">
                        <div className="flex items-center gap-3 overflow-x-auto pb-4 snap-x [&::-webkit-scrollbar]:hidden [-ms-overflow-style:'none'] [scrollbar-width:'none']">
                            <button
                                onClick={() => setSelectedDate('')}
                                className={`flex items-center gap-2 snap-start shrink-0 px-5 py-2.5 rounded-xl font-bold text-sm transition-all duration-300 ${
                                    selectedDate === ''
                                        ? 'bg-brand-500 text-white shadow-glow border border-transparent'
                                        : 'bg-white dark:bg-[#121622] text-slate-700 dark:text-slate-300 border border-slate-200 dark:border-white/10 hover:border-brand-500/30 dark:hover:border-brand-500/30 hover:bg-slate-50 dark:hover:bg-white/5'
                                }`}
                            >
                                <Calendar className="w-4 h-4" /> All Days
                            </button>
                            {uniqueDates.map(date => (
                                <button
                                    key={date}
                                    onClick={() => setSelectedDate(date)}
                                    className={`snap-start shrink-0 px-5 py-2.5 rounded-xl font-bold text-sm transition-all duration-300 ${
                                        selectedDate === date
                                            ? 'bg-brand-500 text-white shadow-glow border border-transparent'
                                            : 'bg-white dark:bg-[#121622] text-slate-700 dark:text-slate-300 border border-slate-200 dark:border-white/10 hover:border-brand-500/30 dark:hover:border-brand-500/30 hover:bg-slate-50 dark:hover:bg-white/5'
                                    }`}
                                >
                                    {formatShortDate(date)}
                                </button>
                            ))}
                        </div>
                    </div>
                  </div>

                  {}
                  {/* Main Transfer Grid */}
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {filteredAndSortedTransfers.length === 0 ? (
                      <div className="col-span-full flex flex-col items-center justify-center py-24 bg-white dark:bg-white/5 rounded-3xl border border-slate-200 dark:border-white/5 border-dashed">
                        <div className="w-16 h-16 bg-slate-100 dark:bg-white/5 rounded-full flex items-center justify-center mb-4">
                            <Search className="w-8 h-8 text-slate-400" />
                        </div>
                        <h3 className="text-xl font-bold font-display text-slate-800 dark:text-slate-200 mb-2">No Transfers Found</h3>
                        <p className="text-slate-500 dark:text-slate-400 text-center max-w-sm mb-6">We couldn't find any transfers matching your current filters. Try adjusting them.</p>
                        <button onClick={clearAllFilters} className="px-6 py-2.5 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold rounded-xl hover:opacity-90 transition-opacity">
                          Clear Filters
                        </button>
                      </div>
                    ) : (
                      filteredAndSortedTransfers.map((transfer) => (
                        <div key={transfer.id} className="group bg-white dark:bg-[#121622] rounded-[1.5rem] border border-slate-200 dark:border-white/5 overflow-hidden hover:border-brand-500/30 dark:hover:border-brand-500/30 hover:shadow-xl dark:hover:shadow-glow transition-all duration-300 flex flex-col">
                          
                          <div className="p-5 flex items-start gap-4">
                            <div className="relative shrink-0">
                                <div className="absolute inset-0 bg-brand-500 rounded-full blur opacity-0 group-hover:opacity-40 transition-opacity duration-300"></div>
                                <img 
                                    src={transfer.playerPhotoUrl ? transfer.playerPhotoUrl : generateAvatar(transfer.playerName, 200)} 
                                    alt={transfer.playerName} 
                                    className="w-16 h-16 rounded-full object-cover border-2 border-white dark:border-slate-800 relative z-10" 
                                    onError={(e) => { e.target.onerror = null; e.target.src = generateAvatar(transfer.playerName, 200); }} 
                                />
                            </div>

                            <div className="flex-1 min-w-0 pt-1">
                                <h3 className="text-lg font-black font-display text-slate-900 dark:text-white leading-tight truncate mb-1" title={transfer.playerName}>
                                    {transfer.playerName}
                                </h3>
                                <div className="flex items-center gap-2 text-xs font-semibold">
                                    <span 
                                        onClick={() => handleQuickFilter('nationality', transfer.nationality)} 
                                        className="text-slate-500 dark:text-slate-400 hover:text-brand-500 dark:hover:text-brand-400 cursor-pointer transition-colors truncate"
                                        title={`Filter by ${transfer.nationality}`}
                                    >
                                        {transfer.nationality}
                                    </span>
                                    <span className="w-1 h-1 rounded-full bg-slate-300 dark:bg-slate-600"></span>
                                    <span className="text-brand-600 dark:text-brand-400 px-1.5 py-0.5 bg-brand-50 dark:bg-brand-500/10 rounded">
                                        {transfer.position}
                                    </span>
                                </div>
                            </div>
                          </div>

                          <div className="px-5 py-4 bg-slate-50/50 dark:bg-black/20 border-y border-slate-100 dark:border-white/5 flex flex-col justify-center flex-1">
                              <div className="flex items-center justify-between w-full">
                                  <div className="flex-1 min-w-0 pr-2">
                                      <span 
                                        onClick={() => handleQuickFilter('team', transfer.fromClub)} 
                                        className="block text-sm font-semibold text-slate-600 dark:text-slate-300 truncate cursor-pointer hover:text-brand-500 transition-colors"
                                      >
                                          {transfer.fromClub}
                                      </span>
                                  </div>
                                  <div className="shrink-0 flex items-center justify-center w-8 h-8 rounded-full bg-white dark:bg-[#1a1c29] border border-slate-100 dark:border-white/5 text-slate-300 dark:text-slate-500 group-hover:text-brand-500 group-hover:border-brand-200 dark:group-hover:border-brand-500/30 transition-all">
                                      <ArrowRight className="w-4 h-4" />
                                  </div>
                                  <div className="flex-1 min-w-0 pl-2 text-right">
                                      <span 
                                        onClick={() => handleQuickFilter('team', transfer.toClub)} 
                                        className="block text-sm font-black text-slate-900 dark:text-white truncate cursor-pointer hover:text-brand-500 transition-colors"
                                      >
                                          {transfer.toClub}
                                      </span>
                                  </div>
                              </div>
                          </div>

                          <div className="p-5 flex items-center justify-between">
                              <div className="flex flex-col gap-1 min-w-0">
                                  <div 
                                    onClick={() => handleQuickFilter('league', transfer.league)} 
                                    className="text-xs font-bold text-indigo-600 dark:text-indigo-400 cursor-pointer hover:underline truncate"
                                  >
                                      {transfer.league}
                                  </div>
                                  <div className="flex items-center gap-1.5 text-xs font-medium text-slate-500">
                                      <Calendar className="w-3 h-3" /> {formatDate(transfer.date)}
                                  </div>
                              </div>

                              <button 
                                onClick={() => handleShareTwitter(transfer)} 
                                disabled={generatingId === transfer.id} 
                                className="shrink-0 w-10 h-10 rounded-xl flex items-center justify-center bg-slate-100 dark:bg-white/5 text-slate-500 dark:text-slate-400 hover:bg-[#1DA1F2] hover:text-white dark:hover:bg-[#1DA1F2] dark:hover:text-white transition-all disabled:opacity-50"
                                title="Share Transfer Card"
                              >
                                {generatingId === transfer.id ? (
                                    <span className="w-5 h-5 block animate-spin rounded-full border-2 border-current border-t-transparent"></span>
                                ) : (
                                    <XLogo className="w-4 h-4" />
                                )}
                              </button>
                          </div>
                        </div>
                      ))
                    )}
                    
                    {/* Daily Summary Download Button */}
                    {selectedDate && filteredAndSortedTransfers.length > 0 && (
                      <div className="col-span-full mt-6 flex justify-center">
                        <button 
                          onClick={() => handleShareDaily(selectedDate)}
                          disabled={generatingDailyDate === selectedDate}
                          className="group relative flex items-center gap-3 px-8 py-4 bg-gradient-to-r from-brand-600 to-indigo-600 hover:from-brand-500 hover:to-indigo-500 text-white font-black text-lg rounded-2xl shadow-glow hover:shadow-glow-lg transition-all duration-300 disabled:opacity-70 disabled:cursor-not-allowed overflow-hidden"
                        >
                          <div className="absolute inset-0 bg-white/20 group-hover:translate-x-full -translate-x-full transition-transform duration-700 skew-x-12"></div>
                          {generatingDailyDate === selectedDate ? (
                            <>
                              <span className="w-6 h-6 block animate-spin rounded-full border-4 border-white/30 border-t-white"></span>
                              Generating Summary...
                            </>
                          ) : (
                            <>
                              <Download className="w-6 h-6" />
                              Download {formatShortDate(selectedDate)} Summary
                            </>
                          )}
                        </button>
                      </div>
                    )}
                  </div>

                </main>
                
                {/* Footer */}
                <footer className="w-full border-t border-slate-200 dark:border-white/5 bg-white dark:bg-[#0B0F19] py-8 text-center text-sm font-medium text-slate-500 dark:text-slate-400">
                   <p>© {new Date().getFullYear()} W-Transfer Tracker. All rights reserved.</p>
                </footer>

              </div>
            </div>
          );
        }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
